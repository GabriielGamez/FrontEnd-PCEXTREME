<!DOCTYPE html>
<html lang="es">

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)),

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-neon-green {
            color: #7cfc00;
        }

<body class="bg-[#0a0a0a] bg-[url('/FrontEnd-PCEXTREME/assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased">

    <header id="encabezado-principal"></header>

    <main class="flex-grow flex flex-col items-center px-6 py-12 space-y-20">

        <div id="contenedor-nosotros" class="w-full flex flex-col items-center space-y-20">

                    </p>
                    <a href="/FrontEnd-PCEXTREME/public/contacto.html"
                        class="inline-flex items-center gap-3 bg-[#25D366] hover:bg-green-600 text-white font-bold py-4 px-8 rounded-2xl transition shadow-xl transform hover:scale-105">
                        <i class="fa-brands fa-whatsapp text-2xl"></i>
                        Contáctanos
                    </a>
                </div>
            </div>
        </section>

    <footer id="pie-de-pagina"></footer>

    <script src="/FrontEnd-PCEXTREME/assets/main.js"></script>
