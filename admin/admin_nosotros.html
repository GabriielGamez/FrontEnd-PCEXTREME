<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link rel="icon" type="image/png" href="./assets/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-[#0a0a0a] text-white antialiased">

    <header id="encabezado-principal" class="w-full h-20 bg-black flex items-center px-8 border-b border-gray-800">
    </header>


    <h3>Gestión de "Sobre Nosotros"</h3>
    <p>Edita las tarjetas de Quiénes Somos, Misión y Visión.</p>

    <div style="background: #d4edda; color: #155724; padding: 15px; margin-bottom: 20px; border-radius: 5px;">
    </div>

    <div style="display: flex; gap: 30px; flex-wrap: wrap;">

        <div style="flex: 1; min-width: 300px;">
            <table class="table-admin">
                <thead>
                    <tr>
                        <th>Imagen</th>
                        <th>Título</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <img src=" style=" width: 50px; height: 50px; object-fit: cover; border-radius: 4px;>
                        </td>
                        <td><strong></strong></td>
                        <td>
                            <a href="admin_nosotros.html editar=>" class="btn-action"
                                style="background-color: #333;">Editar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="flex: 1; min-width: 300px;">
            <div
                style="background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #76c838;">
                <h4 style="margin-top:0;">Editando:</h4>

                <form method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="idInfo" value="">

                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Título:</label>
                    <input type="text" name="titulo" value="" required
                        style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd;">

                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Descripción:</label>
                    <textarea name="descripcion" rows="6" required
                        style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd;"></textarea>

                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Imagen Actual:</label>
                    <img src="" style="max-width: 150px; display:block; margin-bottom: 10px; border-radius: 5px;">

                    <label style="display:block; font-weight:bold; margin-bottom:5px;">Cambiar Imagen
                        (Opcional):</label>
                    <input type="file" name="imagen" accept="image/*" style="margin-bottom: 20px;">

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" name="actualizar_info" class="btn-action"
                            style="padding: 10px 20px;">Guardar Cambios</button>
                        <a href="admin_nosotros.html"
                            style="padding: 10px 20px; background: #ccc; color: #333; text-decoration: none; border-radius: 5px; font-weight: bold;">Cancelar</a>
                    </div>
                </form>
            </div>
            <div style="background: #e9ecef; padding: 30px; border-radius: 8px; text-align: center; color: #666;">
                <p>Selecciona un elemento de la lista para editarlo.</p>
            </div>
        </div>

    </div>

    </main>
    </div>

    <footer id="pie-de-pagina" class="bg-black py-12 px-8"></footer>

    <script src="./assets/main.js"></script>
</body>

</html>
