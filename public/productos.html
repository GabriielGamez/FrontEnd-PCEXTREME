<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catálogo de Productos — PC EXTREME</title>

    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Ocultar barra de scroll en las categorías para un diseño más limpio */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <link rel="stylesheet" href="/FrontEnd-PCEXTREME/assets/styles.css" />
</head>

<body class="bg-[#0a0a0a] bg-[url('/FrontEnd-PCEXTREME/assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased flex flex-col min-h-screen">

    <header id="encabezado-principal" class="w-full h-20 bg-black flex items-center px-8 border-b border-gray-800"></header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-12">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold mb-4">Catálogo de <span class="text-[#7ed957]">Productos</span></h1>
            <p class="text-gray-400">Componentes de alta calidad para llevar tu equipo al límite.</p>
        </div>

        <div class="w-full overflow-x-auto no-scrollbar mb-10">
            <div id="contenedor-categorias" class="flex justify-center md:justify-center gap-4 min-w-max px-2">
                <button class="bg-gray-800 text-gray-400 px-6 py-2 rounded-full text-sm font-semibold animate-pulse">Cargando...</button>
            </div>
        </div>

        <div id="estado-productos" class="text-center w-full hidden">
            <svg class="animate-spin h-8 w-8 text-[#7ed957] mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-gray-400">Cargando inventario...</p>
        </div>

        <div id="cuadricula-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <footer id="pie-de-pagina" class="bg-black py-12 px-8 mt-auto"></footer>
    <script src="/FrontEnd-PCEXTREME/assets/main.js"></script>
</body>
</html>
