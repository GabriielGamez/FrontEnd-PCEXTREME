<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Productos — Admin PC EXTREME</title>

    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dswljrmnu/image/upload/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#0a0a0a] text-white antialiased min-h-screen flex flex-col">

    <header class="w-full h-20 bg-[#111] flex items-center justify-between px-8 border-b border-gray-800">
        <div class="font-bold text-xl text-[#7ed957]">ADMIN PANEL</div>
        <a href="/FrontEnd-PCEXTREME/index.html" class="text-gray-400 hover:text-white transition text-sm">Volver al sitio</a>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-10">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold">Gestión de <span class="text-[#7ed957]">Productos</span></h1>
            <button onclick="abrirModalProducto()" class="bg-[#7ed957] hover:bg-[#6bc148] text-black font-bold py-2 px-6 rounded-lg transition duration-300 shadow-[0_0_15px_rgba(126,217,87,0.3)]">
                + Nuevo Producto
            </button>
        </div>

        <div class="bg-[#111] border border-gray-800 rounded-2xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#1a1a1a] text-gray-400 text-sm uppercase tracking-wider border-b border-gray-800">
                            <th class="p-4">ID</th>
                            <th class="p-4">Imagen</th>
                            <th class="p-4">Nombre</th>
                            <th class="p-4">Categoría</th>
                            <th class="p-4">Precio</th>
                            <th class="p-4">Stock</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos-admin" class="text-sm divide-y divide-gray-800">
                        <tr><td colspan="7" class="text-center py-8 text-gray-500 animate-pulse">Cargando inventario...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-producto" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex justify-center items-center p-4">
        <div class="bg-[#151515] border border-gray-800 rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl transform transition-all">
            <div class="p-6 md:p-8">
                <h2 id="modal-titulo" class="text-2xl font-bold mb-6 text-white border-b border-gray-800 pb-4">Añadir Producto</h2>
                
                <form id="formulario-producto" class="space-y-4">
                    <input type="hidden" id="admin-id"> <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Nombre del Producto</label>
                            <input type="text" id="admin-nombre" required class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-[#7ed957]">
                        </div>
                        <div>
                            <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Categoría</label>
                            <input type="text" id="admin-categoria" required class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-[#7ed957]">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Precio ($)</label>
                            <input type="number" step="0.01" min="0" id="admin-precio" required class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-[#7ed957]">
                        </div>
                        <div>
                            <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Stock</label>
                            <input type="number" min="0" step="1" id="admin-stock" required class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-[#7ed957]">
                        </div>
                    </div>

                    <div class="md:col-span-2 border border-dashed border-gray-700 rounded-lg p-4 bg-[#0a0a0a]">
                        <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Subir Imagen del Producto</label>
                        
                        <input type="file" id="admin-imagen-file" accept="image/*" 
                            class="w-full text-sm text-gray-400 
                            file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 
                            file:text-sm file:font-semibold file:bg-[#7ed957] file:text-black 
                            hover:file:bg-[#6bc148] transition cursor-pointer">
                        
                        <div id="contenedor-imagen-actual" class="hidden mt-3 text-xs text-gray-500 flex items-center gap-2">
                            <span>Imagen actual guardada:</span>
                            <span id="nombre-imagen-actual" class="text-white font-bold bg-gray-800 px-2 py-1 rounded"></span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Descripción</label>
                        <textarea id="admin-descripcion" rows="3" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-[#7ed957]"></textarea>
                    </div>

                    <div class="flex justify-end gap-3 mt-6 pt-6 border-t border-gray-800">
                        <button type="button" onclick="cerrarModalProducto()" class="px-6 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">Cancelar</button>
                        <button type="submit" id="btn-guardar-producto" class="bg-[#7ed957] hover:bg-[#6bc148] text-black font-bold px-6 py-2 rounded-lg transition">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/FrontEnd-PCEXTREME/assets/main.js"></script>
</body>
</html>
