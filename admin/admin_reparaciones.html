<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Reparaciones — Admin PC EXTREME</title>

    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Ocultar flechas numéricas igual que en consulta */
        .no-spinners::-webkit-outer-spin-button,
        .no-spinners::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .no-spinners {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="bg-[#0f1115] text-gray-200 antialiased flex flex-col min-h-screen">

    <header id="encabezado-admin"></header>

    <main class="flex-grow w-full max-w-[1400px] mx-auto px-6 py-8">

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <h1 class="text-2xl font-bold text-white">Gestión de Reparaciones</h1>

            <div class="relative w-full sm:w-72">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <span class="text-gray-500">🔍</span>
                </div>
                <input type="text" id="buscador-reparaciones" placeholder="Buscar Folio o ID Equipo..."
                    class="block w-full pl-10 pr-3 py-2 border border-gray-700 rounded-md leading-5 bg-[#1a1c20] text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-[#7ed957] focus:border-[#7ed957] sm:text-sm transition duration-150 ease-in-out">
            </div>
        </div>

        <div id="alerta-sistema"
            class="hidden bg-green-900 border border-green-500 text-green-200 px-4 py-3 rounded mb-6 font-medium">
        </div>

        <div class="bg-[#1a1c20] rounded-lg shadow-xl border border-gray-800 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-900 text-gray-400 font-semibold border-b border-gray-800 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-4 py-4 w-24">Folio</th>
                            <th class="px-4 py-4 w-48">Equipo</th>
                            <th class="px-4 py-4">Falla Reportada</th>
                            <th class="px-4 py-4 w-[350px]">Actualizar Estado / Inventario</th>
                            <th class="px-4 py-4 w-24 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-reparaciones" class="divide-y divide-gray-800">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <footer id="admin-piePagina" class="mt-auto"></footer>

    <script src="/FrontEnd-PCEXTREME/admin/admin.js"></script>
</body>

</html>
