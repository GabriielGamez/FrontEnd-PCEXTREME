<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rastreo de Servicio — PC EXTREME</title>

    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

    <link rel="stylesheet" href="/FrontEnd-PCEXTREME/assets/styles.css" />
</head>

<body class="bg-[#0a0a0a] bg-[url('./assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased">

    <header id="encabezado-principal" class="w-full h-20 bg-black flex items-center px-8 border-b border-gray-800">
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-6">

        <section
            class="w-full max-w-3xl bg-[#0a0a0a]/80 backdrop-blur-md border border-gray-800 rounded-3xl p-8 md:p-12 shadow-2xl">

            <div class="text-center mb-8">
                <h2 class="text-3xl md:text-4xl font-extrabold mb-3">Consulta tu Equipo</h2>
                <p class="text-gray-400 text-sm md:text-base">Ingresa tu número de folio para ver el estado de tu
                    reparación.</p>
            </div>

            <form id="formulario-consulta"
                class="flex flex-col md:flex-row justify-center items-center gap-4 max-w-lg mx-auto mb-6">
                <input type="number" id="input-folio" placeholder="Ej: 105" required
                    class="w-full md:w-2/3 bg-[#ffffff] border border-gray-700 rounded-full px-6 py-3 text-black focus:outline-none focus:border-[#7ed957] transition text-center md:text-left [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">

                <button type="submit"
                    class="w-full md:w-auto bg-[#7ed957] hover:bg-[#6bc148] text-white font-bold py-3 px-8 rounded-full transition duration-300 shadow-[0_0_15px_rgba(126,217,87,0.3)]">
                    Rastrear
                </button>
            </form>

            <div id="mensaje-error"
                class="hidden w-full max-w-lg mx-auto bg-red-500/10 border border-red-500/20 text-red-400 text-center py-3 px-4 rounded-lg mb-6 text-sm">
            </div>

            <div id="resultado-consulta"
                class="hidden mt-10 border-t border-gray-800 pt-8 transition-all duration-500 opacity-0">

                <div
                    class="flex flex-col md:flex-row justify-between items-center bg-[#111] border border-gray-800 p-4 rounded-lg mb-6 gap-4">
                    <span class="text-lg text-gray-300">ORDEN DE SERVICIO <strong id="resultado-folio"
                            class="text-white text-xl">#00000</strong></span>
                    <span id="resultado-estado"
                        class="bg-blue-600/20 text-blue-400 border border-blue-600/50 px-4 py-1 rounded-full text-sm font-bold tracking-wide uppercase">
                        En Revisión
                    </span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">

                    <div class="flex flex-col gap-4">
                        <h3 class="text-[#7ed957] font-semibold border-b border-gray-800 pb-2 flex items-center gap-2">
                            <span>💻</span> Datos del Equipo
                        </h3>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Equipo:</span>
                            <span id="resultado-equipo" class="text-white text-right font-medium">--</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Número de Serie:</span>
                            <span id="resultado-serie" class="text-white text-right font-medium">--</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Fecha de Ingreso:</span>
                            <span id="resultado-fecha" class="text-white text-right font-medium">--</span>
                        </div>
                    </div>

                    <div class="flex flex-col gap-4">
                        <h3 class="text-[#7ed957] font-semibold border-b border-gray-800 pb-2 flex items-center gap-2">
                            <span>🔧</span> Detalle del Servicio
                        </h3>
                        <div class="flex flex-col text-sm gap-1">
                            <span class="text-gray-500">Problema Reportado:</span>
                            <span id="resultado-problema"
                                class="text-white bg-[#1a1a1a] p-3 rounded-lg border border-gray-800">--</span>
                        </div>
                        <div class="flex flex-col text-sm gap-1">
                            <span class="text-gray-500">Diagnóstico Técnico:</span>
                            <span id="resultado-diagnostico"
                                class="text-blue-400 bg-blue-900/10 p-3 rounded-lg border border-blue-900/30">--</span>
                        </div>
                    </div>

                </div>

                <div class="flex justify-end items-center bg-[#111] border border-gray-800 p-4 rounded-lg">
                    <span class="text-gray-400 mr-4">Total Estimado:</span>
                    <span id="resultado-costo" class="text-2xl font-bold text-[#7ed957]">$0.00</span>
                </div>

            </div>

        </section>

    </main>

    <footer id="pie-de-pagina" class="bg-black py-12 px-8"></footer>
    <script src="./assets/main.js"></script>

</body>

</html>
