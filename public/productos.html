<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Productos — PC EXTREME</title>

    <link rel="preconnect" href="https://fonts.gstatic.com"/>
    <link rel="icon" type="image/png" href="./assets/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .bg-overlay {
            background-color: rgba(0, 0, 0, 0.9);
        }
    </style>
</head>

<body class="bg-[#0a0a0a] bg-[url('./assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased">

    <header id="encabezado-principal" class="w-full h-20 bg-black flex items-center px-8 border-b border-gray-800">
    </header>

    <main class="flex-grow bg-overlay py-12 px-8">
        <h2 class="text-center text-4xl md:text-5xl font-extrabold mb-12 tracking-tight">
            ¡PC Extreme te ofrece productos de alta calidad!
        </h2>

        <div class="max-w-7xl mx-auto flex flex-col md:row gap-8">

            <div class="flex flex-col md:flex-row gap-8 items-start">

                <aside class="w-full md:w-64 bg-black border border-gray-800 rounded-xl p-6 sticky top-24">
                    <h3 class="text-xl font-bold mb-6 pb-2 border-b border-green-500">Categorías</h3>
                    <nav class="flex flex-col gap-3">
                        <button
                            class="flex items-center justify-between w-full bg-[#76c838] text-black font-bold py-3 px-4 rounded-lg transition transform hover:scale-105">
                            COMPONENTES <span class="text-xl">›</span>
                        </button>
                        <button
                            class="flex items-center justify-between w-full bg-black border border-gray-800 hover:border-gray-600 py-3 px-4 rounded-lg text-sm font-semibold transition">
                            LIMPIEZA <span class="text-xl">›</span>
                        </button>
                        <button
                            class="flex items-center justify-between w-full bg-black border border-gray-800 hover:border-gray-600 py-3 px-4 rounded-lg text-sm font-semibold transition">
                            MONITORES <span class="text-xl">›</span>
                        </button>
                        <button
                            class="flex items-center justify-between w-full bg-black border border-gray-800 hover:border-gray-600 py-3 px-4 rounded-lg text-sm font-semibold transition">
                            PERIFÉRICOS <span class="text-xl">›</span>
                        </button>
                    </nav>
                </aside>

                <section class="flex-1">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

                        <div
                            class="bg-[#1a1a1a] rounded-xl overflow-hidden border border-transparent hover:border-[#76c838] transition-all group shadow-lg flex flex-col">
                            <div class="bg-white p-6 flex justify-center items-center h-64">
                                <img src="https://m.media-amazon.com/images/I/71X8Xm8VvVL._AC_SL1500_.jpg"
                                    alt="RTX 4060"
                                    class="max-h-full object-contain group-hover:scale-110 transition-transform">
                            </div>
                            <div class="p-5 flex flex-col flex-grow text-center">
                                <h3 class="font-bold text-base leading-tight mb-2">Tarjeta Gráfica Gigabyte GeForce RTX
                                    4060 Eagle OC 8GB</h3>
                                <p class="text-gray-400 text-xs mb-4">Ver detalles</p>
                                <div class="mt-auto">
                                    <span class="text-[#76c838] text-xl font-extrabold">$7,804.99</span>
                                </div>
                            </div>
                        </div>

                        <div
                            class="bg-[#1a1a1a] rounded-xl overflow-hidden border border-transparent hover:border-[#76c838] transition-all group shadow-lg flex flex-col">
                            <div class="bg-white p-6 flex justify-center items-center h-64">
                                <img src="https://m.media-amazon.com/images/I/718Vv8S9S8L._AC_SL1500_.jpg" alt="Ryzen 5"
                                    class="max-h-full object-contain group-hover:scale-110 transition-transform">
                            </div>
                            <div class="p-5 flex flex-col flex-grow text-center border-t border-gray-800">
                                <h3 class="font-bold text-base leading-tight mb-2">Procesador AMD Ryzen 5 5600X</h3>
                                <p class="text-gray-400 text-xs mb-4">Ver detalles</p>
                                <div class="mt-auto">
                                    <span class="text-[#76c838] text-xl font-extrabold">$3,200.00</span>
                                </div>
                            </div>
                        </div>

                        <div
                            class="bg-[#1a1a1a] rounded-xl overflow-hidden border border-[#76c838] transition-all group shadow-lg flex flex-col">
                            <div class="bg-white p-6 flex justify-center items-center h-64">
                                <img src="https://m.media-amazon.com/images/I/61vG64IQyBL._AC_SL1500_.jpg" alt="RAM XPG"
                                    class="max-h-full object-contain group-hover:scale-110 transition-transform">
                            </div>
                            <div class="p-5 flex flex-col flex-grow text-center">
                                <h3 class="font-bold text-base leading-tight mb-2">Memoria RAM XPG Spectrix D50 RGB 16GB
                                    (2x8GB) 3200MHz</h3>
                                <p class="text-gray-400 text-xs mb-4">Ver detalles</p>
                                <div class="mt-auto">
                                    <span class="text-[#76c838] text-xl font-extrabold">$1,181.99</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </main>

    <footer id="pie-de-pagina" class="bg-black py-12 px-8"></footer>

    <script src="./assets/main.js"></script>

</body>

</html>
