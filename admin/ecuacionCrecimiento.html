<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proyección de Crecimiento — Admin PC EXTREME</title>
    
    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>

<body class="bg-[#0f1115] text-gray-200 antialiased flex flex-col min-h-screen">

    <header id="encabezado-admin"></header>

    <main class="flex-grow w-full max-w-[1400px] mx-auto px-6 py-8">

        <a href="/FrontEnd-PCEXTREME/admin/admin_clientes.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-[#7ed957] font-semibold text-sm mb-6 transition duration-200 group">
            <i class="fas fa-arrow-left transform group-hover:-translate-x-1 transition-transform"></i> 
            Volver a Gestión de Clientes
        </a>

        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
            <h1 class="text-3xl font-extrabold text-white">Modelo de Crecimiento</h1>
        </div>

        <div class="bg-[#1a1c20] p-6 rounded-xl shadow-lg border border-gray-800">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                
                <div class="bg-[#0f1115] p-5 rounded-lg border border-gray-700 flex flex-col justify-between">
                    <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Rango de Proyección</label>
                    
                    <div class="flex flex-col sm:flex-row gap-3 mb-3">
                        <div class="w-full">
                            <span class="text-[10px] text-gray-500 uppercase tracking-wider block mb-1">Desde:</span>
                            <input type="month" id="input-inicio" value="2026-03" class="w-full bg-[#1a1c20] border border-gray-700 text-white px-3 py-2 rounded text-sm focus:outline-none focus:border-[#7ed957] cursor-pointer">
                        </div>
                        <div class="w-full">
                            <span class="text-[10px] text-gray-500 uppercase tracking-wider block mb-1">Hasta:</span>
                            <input type="month" id="input-fin" value="2030-12" class="w-full bg-[#1a1c20] border border-gray-700 text-white px-3 py-2 rounded text-sm focus:outline-none focus:border-[#7ed957] cursor-pointer">
                        </div>
                    </div>

                    <button onclick="calcularCrecimiento()" class="w-full bg-[#7ed957] hover:bg-[#6bc148] text-black font-bold px-5 py-2 rounded transition shadow-sm mt-auto">
                        Calcular Proyección
                    </button>
                </div>
                <div class="bg-[#0f1115] p-5 rounded-lg border border-gray-700 flex flex-col justify-center items-center">
                    <span class="text-gray-400 text-xs font-bold uppercase mb-2">Tasa de Crecimiento (k)</span>
                    <span id="resultado-k" class="text-3xl font-black text-blue-400">0.0000</span>
                </div>
                
                <div class="bg-[#0f1115] p-5 rounded-lg border border-gray-700 flex flex-col justify-center items-center">
                    <span class="text-gray-400 text-xs font-bold uppercase mb-2">Población Proyectada</span>
                    <span id="resultado-p" class="text-4xl font-black text-[#7ed957]">0</span>
                </div>
            </div>

            <div class="w-full h-80 relative">
                <canvas id="graficaCrecimiento"></canvas>
            </div>
        </div>
    </main>

    <footer id="admin-piePagina" class="mt-auto"></footer>

    <script src="/FrontEnd-PCEXTREME/admin/admin.js"></script>
</body>
</html>
