<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Detalle de Producto — PC EXTREME</title>

    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dswljrmnu/image/upload/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/FrontEnd/assets/styles.css" />
</head>

<body class="bg-[#0a0a0a] bg-[url('/FrontEnd-PCEXTREME/assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased flex flex-col min-h-screen">

    <header id="encabezado-principal" class="w-full h-20 bg-black flex items-center px-8 border-b border-gray-800"></header>

    <main class="flex-grow max-w-6xl mx-auto w-full px-6 py-12">
        <a href="/FrontEnd-PCEXTREME/public/productos.html" class="inline-flex items-center text-gray-400 hover:text-[#7ed957] transition mb-8">

        </a>

        <div id="estado-detalle" class="text-center w-full">
            <p class="text-gray-400 animate-pulse">Cargando información del producto...</p>
        </div>

        <div id="contenedor-detalle" class="hidden grid grid-cols-1 md:grid-cols-2 gap-12 bg-[#111]/80 backdrop-blur-md border border-gray-800 rounded-3xl p-8 md:p-12 shadow-2xl">
            </div>
    </main>

    <footer id="pie-de-pagina" class="bg-black py-12 px-8 mt-auto"></footer>
    <script src="/FrontEnd/assets/main.js"></script>
