<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel de Control — Admin PC EXTREME</title>
    
    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#0f1115] text-gray-200 antialiased flex flex-col min-h-screen">

    <header id="encabezado-admin"></header>

    <main class="flex-grow w-full max-w-[1400px] mx-auto px-6 py-8">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-white">Panel de Control</h1>
                <p class="text-gray-400 mt-1 text-sm">Resumen general del estado de PC EXTREME.</p>
            </div>
            <a href="/FrontEnd-PCEXTREME/index.html" target="_blank" class="bg-[#1a1c20] border border-gray-700 hover:bg-gray-800 hover:text-[#7ed957] text-white text-sm font-bold py-2.5 px-5 rounded-lg transition duration-300 shadow-sm flex items-center gap-2">
                Ver Sitio Web <span class="text-lg leading-none">↗</span>
            </a>
        </div>

        <div id="alerta-stock" class="hidden bg-yellow-900/20 border border-yellow-600/50 text-yellow-500 p-6 rounded-xl shadow-[0_0_15px_rgba(234,179,8,0.05)] mb-8 transition-all">
            <h4 class="font-bold text-lg mb-3 flex items-center gap-2">
                ⚠️ Atención: Productos con Stock Bajo
            </h4>
            
            <ul id="lista-stock-bajo" class="list-disc list-inside space-y-1.5 ml-2 text-sm text-yellow-400/80 mb-5">
                </ul>

            <a href="/FrontEnd-PCEXTREME/admin/admin_productos.html" class="inline-block bg-yellow-600/20 hover:bg-yellow-600/40 text-yellow-500 border border-yellow-600/50 font-bold text-sm py-2 px-4 rounded transition">
                Ir a reabastecer →
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-[#1a1c20] p-6 rounded-xl shadow-lg border border-gray-800 border-t-4 border-t-[#7ed957] hover:bg-[#252830] hover:-translate-y-1 transition duration-300">
                <h3 class="text-gray-400 font-bold text-sm uppercase tracking-wider">Productos</h3>
                <p id="stat-productos" class="text-5xl font-black text-white my-3 drop-shadow-md">...</p>
                <span class="text-sm text-[#7ed957] font-semibold bg-[#7ed957]/10 px-2 py-1 rounded">En catálogo</span>
            </div>

            <div class="bg-[#1a1c20] p-6 rounded-xl shadow-lg border border-gray-800 border-t-4 border-t-blue-500 hover:bg-[#252830] hover:-translate-y-1 transition duration-300">
                <h3 class="text-gray-400 font-bold text-sm uppercase tracking-wider">Clientes</h3>
                <p id="stat-clientes" class="text-5xl font-black text-white my-3 drop-shadow-md">...</p>
                <span class="text-sm text-blue-400 font-semibold bg-blue-500/10 px-2 py-1 rounded">Registrados</span>
            </div>

            <div class="bg-[#1a1c20] p-6 rounded-xl shadow-lg border border-gray-800 border-t-4 border-t-red-500 hover:bg-[#252830] hover:-translate-y-1 transition duration-300">
                <h3 class="text-gray-400 font-bold text-sm uppercase tracking-wider">Reparaciones</h3>
                <p id="stat-reparaciones" class="text-5xl font-black text-white my-3 drop-shadow-md">...</p>
                <span class="text-sm text-red-400 font-semibold bg-red-500/10 px-2 py-1 rounded">Histórico total</span>
            </div>

        </div>

    </main>

    <footer id="admin-piePagina" class="mt-auto"></footer>

    <script src="/FrontEnd-PCEXTREME/admin/admin.js"></script>
</body>
</html>
