<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ubicación — PC EXTREME</title>

    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .bg-overlay {
            background-color: rgba(0, 0, 0, 0.85);
        }
    </style>
</head>

<body
    class="bg-[#0a0a0a] bg-[url('/FrontEnd-PCEXTREME/assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased">

    <header id="encabezado-principal"></header>

    <main class="flex-grow bg-overlay py-12 px-4 flex items-center justify-center">

        <section
            class="max-w-4xl w-full bg-[#0a0a0a]/80 border border-gray-800 rounded-2xl p-8 md:p-12 shadow-[0_0_30px_rgba(0,0,0,0.8)] backdrop-blur-md text-center">

            <h2 class="text-3xl md:text-4xl font-extrabold mb-4 text-white">Nuestra Ubicación</h2>

            <p class="text-gray-400 mb-6 text-lg">Visítanos en nuestras instalaciones para un diagnóstico profesional.
            </p>

            <strong id="ubi-direccion" class="block text-[#7ed957] text-xl md:text-2xl mb-8 animate-pulse">
                Cargando dirección...
            </strong>

            <a id="ubi-link-maps" href="#" target="_blank"
                class="inline-flex items-center gap-2 bg-[#3f51b5] hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full transition shadow-lg mb-10 text-lg">
                📍 Cómo llegar (Google Maps)
            </a>

            <div class="w-full h-[400px] rounded-xl overflow-hidden border border-gray-800 shadow-inner bg-gray-900">
                <iframe id="ubi-iframe" src="" class="w-full h-full border-0 hidden" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
                <div id="ubi-loading-map" class="w-full h-full flex items-center justify-center text-gray-500">
                    Cargando mapa...
                </div>
            </div>

        </section>
    </main>

    <footer id="pie-de-pagina"></footer>

    <script src="/FrontEnd-PCEXTREME/assets/main.js"></script>
</body>

</html>
