<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - PC EXTREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans">

    <nav class="bg-[#1a1c20] text-white px-6 py-3 flex items-center justify-between shadow-lg">
        <div class="flex items-center space-x-8">
            <div class="flex items-center space-x-2">
                <img src="https://cdn-icons-png.flaticon.com/512/2004/2004699.png" alt="Logo" class="h-8 invert">
                <span class="font-black text-xl tracking-tighter">PC EXTREME</span>
            </div>
            <div class="hidden md:flex space-x-6 text-sm font-medium text-gray-400">
                <a href="#" class="hover:text-white transition">Inicio</a>
                <a href="#" class="hover:text-white transition">Reparaciones</a>
                <a href="#" class="text-white bg-[#2d3035] px-3 py-1 rounded-md">Clientes</a>
                <a href="#" class="hover:text-white transition">Mensajes</a>
                <a href="#" class="hover:text-white transition">Productos</a>
                <a href="#" class="hover:text-white transition">Gestionar Web</a>
                <a href="#" class="hover:text-white transition">Personal</a>
            </div>
        </div>

        <div class="flex items-center space-x-4">
            <span class="bg-green-500 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Administrador</span>
            <span class="text-sm hidden sm:inline text-gray-300">Administrador</span>
            <button class="bg-[#5c2424] hover:bg-red-900 text-white text-xs font-bold py-2 px-4 rounded-md transition">
                Cerrar Sesión
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-10">

        <h2 class="text-3xl font-bold text-gray-800 mb-8">Gestión de Clientes</h2>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-6">
            <div class="flex flex-wrap gap-2">
                <input type="text" id="buscador-clientes" placeholder="Buscar cliente por nombre, correo..."
                    class="flex-1 min-w-[300px] border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <button
                    class="bg-[#3f51b5] hover:bg-blue-800 text-white font-bold py-2 px-8 rounded-md transition shadow-md">
                    Buscar
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-gray-500 uppercase text-xs font-bold border-b border-gray-100">
                            <th class="px-6 py-4 w-20">ID</th>
                            <th class="px-6 py-4">Nombre Completo</th>
                            <th class="px-6 py-4">Contacto</th>
                            <th class="px-6 py-4">Dirección</th>
                            <th class="px-6 py-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-clientes" class="divide-y divide-gray-50">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>

</html>
