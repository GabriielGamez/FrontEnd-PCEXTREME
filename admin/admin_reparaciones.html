<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Reparaciones — Admin PC EXTREME</title>

    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Ocultar flechas numéricas igual que en consulta */
        .no-spinners::-webkit-outer-spin-button,
        .no-spinners::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .no-spinners {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="bg-[#f4f6f9] text-gray-800 antialiased flex flex-col min-h-screen">

    <header id="encabezado-admin"></header>

    <main class="flex-grow w-full max-w-[1400px] mx-auto px-6 py-8">

        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Gestión de Reparaciones</h1>
        </div>

        <div id="alerta-sistema"
            class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6 font-medium">
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead
                                    class="bg-gray-50 text-gray-600 font-semibold border-b border-gray-200 text-xs uppercase tracking-wider">
                                    <tr>
                                        <th class="px-4 py-4 w-24">Folio</th>
                                        <th class="px-4 py-4 w-48">Equipo</th>
                                        <th class="px-4 py-4">Falla Reportada</th>
                                        <th class="px-4 py-4 w-[350px]">Actualizar Estado / Inventario</th>
                                        <th class="px-4 py-4 w-24 text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="lista-reparaciones" class="divide-y divide-gray-100">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </table>
            </div>
        </div>

    </main>

    <footer id="pie-admin" class="mt-auto"></footer>

    <script src="/FrontEnd-PCEXTREME/admin/admin.js"></script>
</body>

</html>
