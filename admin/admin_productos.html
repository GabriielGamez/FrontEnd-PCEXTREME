<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Productos — Admin PC EXTREME</title>

    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dswljrmnu/image/upload/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col">

    <header class="w-full h-16 bg-white flex items-center justify-between px-8 border-b border-gray-200 shadow-sm">
        <div class="font-bold text-xl text-gray-900">ADMIN <span class="text-[#6bc148]">PANEL</span></div>
        <a href="/FrontEnd-PCEXTREME/index.html" class="text-gray-500 hover:text-gray-900 transition text-sm font-medium">Volver al sitio</a>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-extrabold text-gray-900">Gestión de <span class="text-[#6bc148]">Productos</span></h1>
            <button onclick="abrirModalProducto()" class="bg-[#7ed957] hover:bg-[#6bc148] text-gray-900 font-bold py-2 px-6 rounded-lg transition duration-300 shadow-md">
                + Nuevo Producto
            </button>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-xs uppercase tracking-wider border-b border-gray-200">
                            <th class="p-4 font-semibold">ID</th>
                            <th class="p-4 font-semibold">Imagen</th>
                            <th class="p-4 font-semibold">Nombre</th>
                            <th class="p-4 font-semibold">Categoría</th>
                            <th class="p-4 font-semibold">Precio</th>
                            <th class="p-4 font-semibold">Stock</th>
                            <th class="p-4 font-semibold text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos-admin" class="text-sm divide-y divide-gray-200">
                        <tr><td colspan="7" class="text-center py-8 text-gray-500 animate-pulse">Cargando inventario...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-producto" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex justify-center items-center p-4">
        <div class="bg-white border border-gray-200 rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl transform transition-all">
            <div class="p-6 md:p-8">
                <h2 id="modal-titulo" class="text-2xl font-bold mb-6 text-gray-900 border-b border-gray-100 pb-4">Añadir Producto</h2>
                
                <form id="formulario-producto" class="space-y-5">
                    <input type="hidden" id="admin-id">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-gray-600 text-xs font-bold mb-2 uppercase">Nombre del Producto</label>
                            <input type="text" id="admin-nombre" required class="w-full bg-white border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:border-[#7ed957] focus:ring-1 focus:ring-[#7ed957] transition">
                        </div>
                        <div>
                            <label class="block text-gray-600 text-xs font-bold mb-2 uppercase">Categoría</label>
                            <input type="text" id="admin-categoria" required class="w-full bg-white border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:border-[#7ed957] focus:ring-1 focus:ring-[#7ed957] transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-gray-600 text-xs font-bold mb-2 uppercase">Precio ($)</label>
                            <input type="number" step="0.01" min="0" id="admin-precio" required class="w-full bg-white border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:border-[#7ed957] focus:ring-1 focus:ring-[#7ed957] transition">
                        </div>
                        <div>
                            <label class="block text-gray-600 text-xs font-bold mb-2 uppercase">Stock</label>
                            <input type="number" min="0" step="1" id="admin-stock" required class="w-full bg-white border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:border-[#7ed957] focus:ring-1 focus:ring-[#7ed957] transition">
                        </div>
                    </div>

                    <div class="md:col-span-2 border border-dashed border-gray-300 rounded-xl p-5 bg-gray-50">
                        <label class="block text-gray-600 text-xs font-bold mb-2 uppercase">Subir Imagen del Producto</label>
                        <input type="file" id="admin-imagen-file" accept="image/*" 
                            class="w-full text-sm text-gray-600 
                            file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 
                            file:text-sm file:font-semibold file:bg-[#7ed957] file:text-gray-900 
                            hover:file:bg-[#6bc148] transition cursor-pointer">
                        
                        <div id="contenedor-imagen-actual" class="hidden mt-3 text-xs text-gray-500 flex items-center gap-2">
                            <span>Imagen actual guardada:</span>
                            <span id="nombre-imagen-actual" class="text-gray-700 font-bold bg-gray-200 px-2 py-1 rounded"></span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-600 text-xs font-bold mb-2 uppercase">Descripción</label>
                        <textarea id="admin-descripcion" rows="3" class="w-full bg-white border border-gray-300 rounded-lg px-4 py-2 text-gray-900 focus:outline-none focus:border-[#7ed957] focus:ring-1 focus:ring-[#7ed957] transition"></textarea>
                    </div>

                    <div class="flex justify-end gap-3 mt-6 pt-6 border-t border-gray-100">
                        <button type="button" onclick="cerrarModalProducto()" class="px-6 py-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-900 font-medium transition">Cancelar</button>
                        <button type="submit" class="bg-[#7ed957] hover:bg-[#6bc148] text-gray-900 font-bold px-6 py-2 rounded-lg transition shadow-sm">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/FrontEnd-PCEXTREME/admin/admin.js"></script>
</body>
</html>
