<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PC EXTREME — Mantenimiento y Optimización</title>

    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/FrontEnd-PCEXTREME/assets/styleChatbot.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animacion-carrusel {
            display: flex;
            width: max-content;
            animation: scroll 40s linear infinite;
        }

        .animacion-carrusel:hover {
            animation-play-state: paused;
        }
    </style>

    <link rel="stylesheet" href="/FrontEnd-PCEXTREME/assets/styles.css" />
</head>

<body class="bg-[#0a0a0a] bg-[url('/FrontEnd-PCEXTREME/assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased">

    <header id="encabezado-principal"></header>

    <main>
        <section class="max-w-7xl mx-auto px-6 py-20 grid grid-cols-1 md:grid-cols-2 gap-12 items-center">

            <div id="portada-contenido" class="flex flex-col items-start gap-6">
                <p class="text-gray-500 animate-pulse">Cargando información...</p>
            </div>

            <div id="portada-multimedia"
                class="w-full relative bg-[#111] rounded-2xl h-[400px] shadow-[0_0_50px_rgba(126,217,87,0.15)] overflow-hidden flex items-center justify-center border border-gray-800">
                <video autoplay muted loop playsinline
                    class="absolute inset-0 w-full h-full object-cover mix-blend-screen" id="video-empresa">
                </video>
            </div>

        </section>

        <section class="w-full bg-gradient-to-b from-[#0a0a0a] to-[#141414] py-16">
            <div class="w-full px-8 md:px-16 lg:px-24">
                <h2 class="text-3xl font-extrabold mb-8 text-center text-white">Nuestros Servicios</h2>

                <div id="lista-servicios" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                </div>

            </div>
        </section>

        <section class="bg-[#111111]/90 backdrop-blur-sm py-8 border-t border-b border-gray-800 mt-12">
            <div class="w-full px-8 md:px-16 lg:px-24 overflow-hidden">
                <div class="text-center mb-8">
                    <h3 class="text-gray-500 text-xs md:text-sm font-bold uppercase tracking-[0.25em]">
                        Trabajamos con las mejores marcas
                    </h3>
                </div>
                <div id="carrusel-marcas"
                    class="flex justify-between items-center opacity-40 grayscale hover:grayscale-0 transition duration-500 gap-8">
                </div>

            </div>
        </section>
    </main>

    <div id="contenedor-chatbot">
      <button id="bp-toggle-chat" class="extreme-bot-trigger">
        <div class="bot-logo-container">
          <img src="/FrontEnd-PCEXTREME/assets/PCEXTREME.png" alt="Logo" class="bot-logo-img">
        </div>
        <div class="bot-text-container">
          <span class="bot-name">ExtremeBot</span>
        </div>
      </button>
    </div>

    <footer id="pie-de-pagina"></footer>

    <script src="/FrontEnd-PCEXTREME/assets/main.js"></script>
    <script src="/FrontEnd-PCEXTREME/assets/chatLogica.js"></script>
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/02/16/03/20260216035350-09M3VHLE.js" defer></script>
</body>

</html>
