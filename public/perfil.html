<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mi Perfil y Dispositivos — PC EXTREME</title>

    <link rel="icon" type="image/png" href="/FrontEnd-PCEXTREME/assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        .bg-overlay { background-color: rgba(0, 0, 0, 0.85); }
    </style>
</head>

<body class="bg-[#0a0a0a] bg-[url('/FrontEnd-PCEXTREME/assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased">

    <header id="encabezado-principal"></header>

    <main class="flex-grow bg-overlay py-12 px-4 flex items-center">
        
        <section id="vista-perfil" class="max-w-6xl w-full mx-auto flex flex-col-reverse md:flex-row gap-8 transition-all duration-500 block">

            <div class="md:w-7/12 bg-black/70 border border-gray-800 rounded-2xl p-8 backdrop-blur-md shadow-2xl flex flex-col">
                <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                    <h2 class="text-2xl font-bold text-white">Mis <span class="text-[#7ed957]">Dispositivos</span></h2>
                </div>
                <div id="lista-mis-dispositivos" class="flex flex-col gap-4 overflow-y-auto pr-2 max-h-[500px]">
                    <p class="text-gray-500 animate-pulse text-center py-10">Cargando dispositivos...</p>
                </div>
            </div>

            <div class="md:w-5/12 bg-black/70 border border-gray-800 rounded-2xl p-8 backdrop-blur-md shadow-2xl flex flex-col items-center">
                <h2 class="text-2xl font-bold mb-8 text-white w-full text-center border-b border-gray-800 pb-4">Mi Perfil</h2>
                
                <div class="relative p-1 rounded-full bg-gradient-to-tr from-[#7ed957] to-green-900 mb-6 shadow-[0_0_20px_rgba(126,217,87,0.3)]">
                    <div class="bg-[#111] rounded-full p-4">
                        <svg class="w-20 h-20 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                </div>

                <div class="w-full space-y-4">
                    <div class="bg-gray-900/50 border border-gray-800 p-3 rounded-lg">
                        <label class="text-gray-500 text-xs font-bold uppercase tracking-wider">Nombre</label>
                        <p id="perfil-nombre" class="text-lg font-semibold text-white mt-1">...</p>
                    </div>
                    <div class="bg-gray-900/50 border border-gray-800 p-3 rounded-lg">
                        <label class="text-gray-500 text-xs font-bold uppercase tracking-wider">Apellidos</label>
                        <p id="perfil-apellidos" class="text-lg font-semibold text-white mt-1">...</p>
                    </div>
                    <div class="bg-gray-900/50 border border-gray-800 p-3 rounded-lg">
                        <label class="text-gray-500 text-xs font-bold uppercase tracking-wider">Teléfono</label>
                        <p id="perfil-telefono" class="text-lg font-semibold text-white mt-1">...</p>
                    </div>
                    <div class="bg-gray-900/50 border border-gray-800 p-3 rounded-lg">
                        <label class="text-gray-500 text-xs font-bold uppercase tracking-wider">Correo Electrónico</label>
                        <p id="perfil-correo" class="text-lg font-semibold text-[#7ed957] mt-1">...</p>
                    </div>
                </div>

                <div class="mt-8 w-full">
                    <button onclick="abrirEdicionPerfil()" class="w-full bg-[#7ed957] hover:bg-[#6bc148] text-black font-extrabold py-3.5 px-8 rounded-xl transition duration-300 shadow-[0_0_15px_rgba(126,217,87,0.2)]">
                        ✏️ Editar Perfil
                    </button>
                </div>
            </div>
        </section>

        <section id="vista-edicion" class="max-w-5xl w-full mx-auto bg-black/80 border border-[#7ed957] rounded-2xl p-8 md:p-12 flex flex-col md:flex-row gap-12 backdrop-blur-md shadow-[0_0_40px_rgba(126,217,87,0.1)] transition-all duration-500 hidden">
            
            <div class="md:w-1/3 flex flex-col items-center text-center border-r border-gray-800 pr-0 md:pr-12">
                <h2 class="text-4xl font-extrabold mb-8 tracking-tight">Editando</h2>
                <div class="relative p-1 rounded-full bg-gradient-to-tr from-[#7ed957] to-green-900 shadow-[0_0_20px_rgba(126,217,87,0.3)]">
                    <div class="bg-black rounded-full p-4">
                        <svg class="w-24 h-24 text-[#7ed957]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                    </div>
                </div>
                <p class="mt-8 text-gray-400 font-medium">Actualiza tus datos y dirección de contacto.</p>
            </div>

            <div class="md:w-2/3">
                <form id="formulario-editar-perfil" class="space-y-5">
                    <input type="hidden" id="edit-id-cliente">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Nombre</label>
                            <input type="text" id="edit-nombre" required class="bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-[#7ed957] focus:outline-none transition">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Apellido Paterno</label>
                            <input type="text" id="edit-ap-paterno" required class="bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-[#7ed957] focus:outline-none transition">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Apellido Materno</label>
                            <input type="text" id="edit-ap-materno" class="bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-[#7ed957] focus:outline-none transition">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Teléfono</label>
                            <input type="tel" id="edit-telefono" required class="bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-[#7ed957] focus:outline-none transition">
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-gray-400 text-xs font-semibold uppercase">Correo Electrónico</label>
                        <input type="email" id="edit-correo" required class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-[#7ed957] focus:outline-none transition">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Nueva Contraseña <span class="text-gray-600 lowercase font-normal">(Opcional)</span></label>
                            <div class="relative flex items-center">
                                <input type="password" id="edit-nueva-password" placeholder="Dejar en blanco para no cambiar" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 pr-10 text-white focus:border-[#7ed957] focus:outline-none transition">
                                <button type="button" class="btn-ver-password absolute right-3 text-gray-500 hover:text-[#7ed957] transition cursor-pointer">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Confirmar Nueva Contraseña</label>
                            <div class="relative flex items-center">
                                <input type="password" id="edit-conf-password" placeholder="Repite la nueva contraseña" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 pr-10 text-white focus:border-[#7ed957] focus:outline-none transition">
                                <button type="button" class="btn-ver-password absolute right-3 text-gray-500 hover:text-[#7ed957] transition cursor-pointer">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 border-t border-gray-800 pt-5 mt-5">
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">C.P.</label>
                            <input type="text" id="edit-cp" required maxlength="5" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-[#7ed957] focus:outline-none transition">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Estado</label>
                            <input type="text" id="edit-estado" required readonly class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-gray-500 cursor-not-allowed">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Ciudad / Municipio</label>
                            <input type="text" id="edit-ciudad" required readonly class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-gray-500 cursor-not-allowed">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Asentamiento</label>
                            <div id="contenedor-edit-asentamiento">
                                <input type="text" id="edit-asentamiento" required readonly placeholder="Ingresa C.P." class="w-full bg-black border border-gray-800 rounded-lg px-4 py-3 text-gray-500 cursor-not-allowed">
                            </div>
                        </div>
                        <div class="md:col-span-2 flex flex-col gap-2">
                            <label class="text-gray-400 text-xs font-semibold uppercase">Calle y Número</label>
                            <input type="text" id="edit-calle" required class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-[#7ed957] focus:outline-none transition">
                        </div>
                    </div>

                    <div class="flex items-center justify-end gap-4 pt-6">
                        <button type="button" onclick="cerrarEdicionPerfil()" class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-8 rounded-full transition duration-300">
                            Cancelar
                        </button>
                        <button type="submit" class="bg-[#7ed957] hover:bg-[#6bc148] text-black font-extrabold py-3 px-8 rounded-full transition duration-300 shadow-[0_0_15px_rgba(126,217,87,0.2)]">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </section>

    </main>

    <footer id="pie-de-pagina"></footer>
    <script src="/FrontEnd-PCEXTREME/assets/main.js"></script>

</body>

</html>
