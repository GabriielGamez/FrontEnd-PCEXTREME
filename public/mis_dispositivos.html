<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Equipos — PC EXTREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9)), 
                        url('https://images.unsplash.com/photo-1587202372775-e229f172b9d7?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] bg-[url('./assets/background.svg')] bg-cover bg-fixed bg-center text-white antialiased">

    <header id="encabezado-principal" class="w-full h-20 bg-black flex items-center px-8 border-b border-gray-800">
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        
        <div class="glass-container w-full max-w-5xl rounded-3xl p-16 text-center">
            <h1 class="text-5xl font-extrabold mb-4">Mis Equipos</h1>
            <p class="text-gray-400 text-xl mb-12 font-medium">Selecciona un equipo para ver su historial.</p>

            <div class="flex justify-center">
                <div class="bg-white w-80 rounded-xl p-8 relative shadow-2xl cursor-pointer hover:scale-105 transition-transform text-left">
                    <div class="absolute left-0 top-1/4 bottom-1/4 w-1.5 bg-[#7cfc00] rounded-r-full"></div>
                    
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-black text-2xl font-extrabold">HP</h3>
                        <span class="bg-[#e6f4ea] text-[#1e7e34] text-[10px] font-extrabold px-2 py-1 rounded tracking-wide uppercase">
                            En Taller
                        </span>
                    </div>
                    
                    <p class="text-gray-600 font-semibold mb-3">HP victus 3000</p>
                    
                    <div class="inline-block bg-gray-100 rounded px-2 py-1">
                        <span class="text-gray-400 text-[10px] font-bold uppercase mr-1">SN:</span>
                        <span class="text-gray-500 text-[10px] font-mono">24x40</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer id="pie-de-pagina" class="bg-black py-12 px-8"></footer>

    <script src="./assets/main.js"></script>

</body>
</html>
